site_name: Varasto
site_url: http://localhost/docs/
repo_url: https://github.com/my-org/portable-inventory
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started/index.md
  - Concepts:
    - Overview: concepts/index.md
    - Strategies: concepts/strategies.md
    - Polymorphism: concepts/polymorphism.md
    - Math Theory: concepts/theory.md
  - Guides:
    - Admin Manual: guides/admin.md
    - Operator Manual: guides/daily-usage.md
  - Reference:
    - Architecture: reference/architecture.md
    - API: reference/api.md
    - Specifications: reference/specifications.md
  - API:
    - Authentication: api/authentication.md
    - Widget API: api/widget-api.md
    - Versioning: api/versioning.md
    - Webhooks: api/webhooks.md
  - Operations:
    - Deployment: operations/deployment.md
    - Monitoring: operations/monitoring.md
    - Troubleshooting: operations/troubleshooting.md
    - Scaling: operations/scaling.md
    - Data Retention: operations/data-retention.md
  - Development:
    - Overview: development/index.md
    - Testing: development/testing.md

plugins:
  - search

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
