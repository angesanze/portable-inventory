# Non-secret runtime env for the Cloud Run service (secrets — SECRET_KEY,
# DATABASE_URL — are injected separately from Secret Manager via --set-secrets).
# ".run.app" lets Django accept the Cloud Run host; the SPA (served on
# app.varasto.rocks via Firebase Hosting) calls the API cross-origin with Bearer
# tokens, so app.varasto.rocks is allowed for CORS/CSRF. It is also in
# ALLOWED_HOSTS because Firebase Hosting proxies /go/** to this service with the
# original Host header. The legacy *.web.app origins are kept for rollback.
DEBUG: "0"
CLOUD_SQL_CONNECTION_NAME: "varasto-prod:europe-west1:varasto-db"
DJANGO_ALLOWED_HOSTS: ".run.app varasto-prod.web.app varasto-prod.firebaseapp.com app.varasto.rocks"
CSRF_TRUSTED_ORIGINS: "https://varasto-prod.web.app https://varasto-prod.firebaseapp.com https://app.varasto.rocks"
CORS_ALLOWED_ORIGINS: "https://varasto-prod.web.app,https://varasto-prod.firebaseapp.com,https://app.varasto.rocks"
FRONTEND_BASE_URL: "https://app.varasto.rocks"
PUBLIC_BASE_URL: "https://app.varasto.rocks"
