# Non-secret runtime env for the Cloud Run service (secrets — SECRET_KEY,
# DATABASE_URL — are injected separately from Secret Manager via --set-secrets).
# ".run.app" lets Django accept the Cloud Run host; the SPA (Firebase) calls the
# API cross-origin with Bearer tokens, so the Firebase domains are allowed for
# CORS/CSRF.
DEBUG: "0"
CLOUD_SQL_CONNECTION_NAME: "varasto-prod:europe-west1:varasto-db"
DJANGO_ALLOWED_HOSTS: ".run.app varasto-prod.web.app varasto-prod.firebaseapp.com"
CSRF_TRUSTED_ORIGINS: "https://varasto-prod.web.app https://varasto-prod.firebaseapp.com"
CORS_ALLOWED_ORIGINS: "https://varasto-prod.web.app,https://varasto-prod.firebaseapp.com"
FRONTEND_BASE_URL: "https://varasto-prod.web.app"
PUBLIC_BASE_URL: "https://varasto-prod.web.app"
