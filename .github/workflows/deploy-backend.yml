name: deploy-backend

# Build the Django image, run migrations, and deploy to Cloud Run on every push
# to main that touches the backend. Auth to GCP is keyless via Workload Identity
# Federation (WIF_PROVIDER / WIF_SERVICE_ACCOUNT repo secrets).
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: varasto-prod
  REGION: europe-west1
  SERVICE: varasto-api
  INSTANCE: varasto-prod:europe-west1:varasto-db
  IMAGE_BASE: europe-west1-docker.pkg.dev/varasto-prod/containers/varasto-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image
        run: |
          IMAGE="${IMAGE_BASE}:${GITHUB_SHA::12}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
          docker build -t "$IMAGE" backend
          docker push "$IMAGE"

      - name: Run migrations (Cloud Run job, self-bootstrapping)
        run: |
          if ! gcloud run jobs describe varasto-migrate --region "$REGION" --project "$PROJECT_ID" >/dev/null 2>&1; then
            gcloud run jobs create varasto-migrate --image "$IMAGE" \
              --region "$REGION" --project "$PROJECT_ID" \
              --set-cloudsql-instances "$INSTANCE" \
              --service-account "varasto-run@${PROJECT_ID}.iam.gserviceaccount.com" \
              --set-secrets "SECRET_KEY=SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
              --set-env-vars "CLOUD_SQL_CONNECTION_NAME=${INSTANCE}" \
              --command python --args manage.py,migrate --quiet
          else
            gcloud run jobs update varasto-migrate --image "$IMAGE" \
              --region "$REGION" --project "$PROJECT_ID" --quiet
          fi
          gcloud run jobs execute varasto-migrate \
            --region "$REGION" --project "$PROJECT_ID" --wait

      - name: Deploy service
        run: |
          gcloud run deploy "$SERVICE" --image "$IMAGE" \
            --region "$REGION" --project "$PROJECT_ID" \
            --platform managed --allow-unauthenticated \
            --add-cloudsql-instances "$INSTANCE" \
            --service-account "varasto-run@${PROJECT_ID}.iam.gserviceaccount.com" \
            --set-secrets "SECRET_KEY=SECRET_KEY:latest,DATABASE_URL=DATABASE_URL:latest" \
            --env-vars-file backend/cloudrun.env.yaml \
            --quiet
