name: CI

# Merge-blocking gates. Note: the frontend type gate MUST be `tsc -b` (the root
# tsconfig is references-only, so `tsc --noEmit` checks nothing and is a false
# green). The backend runs on Python 3.11 (the Docker target); newer Pythons
# break the Django admin template tests.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: ruff lint
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: pytest
        env:
          # DEBUG stays off so the e2e seed endpoint is correctly not routable;
          # supply an explicit key (settings raises without one when DEBUG=0).
          SECRET_KEY: ci-insecure-test-key-not-for-prod
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: type-check (real gate — tsc -b, not the false-green tsc --noEmit)
        run: npx tsc -b --force
      - name: lint
        run: npx eslint .
      - name: unit tests
        run: npm test -- --run

  sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
      # `build` runs vite build + `tsc --emitDeclarationOnly` (the SDK's type
      # gate); `test` runs the vitest suite. Previously the embeddable SDK — the
      # least-gated artifact in the repo — had no CI at all.
      - name: build (+ type-check)
        run: npm run build
      - name: unit tests
        run: npm test
