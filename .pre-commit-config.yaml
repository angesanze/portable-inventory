# Pre-commit configuration
# See https://pre-commit.com for more information
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-added-large-files
    -   id: detect-private-key

-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in sync with backend/requirements-dev.txt (ruff formatting can differ
    # between versions); config lives in backend/ruff.toml (auto-discovered).
    rev: v0.15.20
    hooks:
    -   id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
    -   id: ruff-format

-   repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0
    hooks:
    -   id: eslint
        files: \.(js|jsx|ts|tsx)$
        types: [file]
        additional_dependencies:
        -   eslint@9
        -   typescript-eslint@8
        -   eslint-plugin-react-hooks@5
        -   eslint-plugin-react-refresh@0.4

-   repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.0.3
    hooks:
    -   id: prettier
        types_or: [javascript, jsx, ts, tsx, css, scss, html, markdown]

-   repo: local
    hooks:
    -   id: no-debug-prints
        name: Check for debug prints
        entry: '(^|\s)(print\(|console\.log\(|debugger;|import pdb|breakpoint\(\))'
        language: pygrep
        types_or: [python, javascript, ts, tsx]
    -   id: no-hardcoded-secrets
        name: Check for hardcoded secrets
        entry: '(SECRET_KEY|API_KEY|PASSWORD|TOKEN)\s*=\s*["\x27][^"\x27]{8,}'
        language: pygrep
        exclude: '(\.example|\.sample|settings\.py|test_|ci\.yml)'
        types_or: [python, javascript, ts, tsx, yaml]
